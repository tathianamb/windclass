<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1923">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WindClass">
<title>WindClass — Classificador Eólico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f1923;
    --surface:  #162030;
    --card:     #1c2c3e;
    --border:   #243447;
    --text:     #e8f0f8;
    --muted:    #5a7a95;
    --accent:   #00d4ff;

    --speed:    #38bdf8;
    --speed-bg: #0c2233;
    --power:    #fbbf24;
    --power-bg: #231a00;
    --both:     #34d399;
    --both-bg:  #002918;
    --other:    #94a3b8;
    --other-bg: #141e2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 17px; font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); }
  header .subtitle {
    font-size: 11px; color: var(--muted);
    margin-left: auto;
    font-family: 'Space Mono', monospace;
  }

  /* ── Main ── */
  main { padding: 20px; max-width: 900px; margin: 0 auto; }

  /* ── Drop zone ── */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    background: var(--surface);
    margin-bottom: 22px;
  }
  .dropzone.active, .dropzone:hover { border-color: var(--accent); background: #0c2233; }
  .dropzone .icon { font-size: 38px; margin-bottom: 10px; }
  .dropzone .label { font-size: 15px; font-weight: 600; color: var(--text); }
  .dropzone .hint  { font-size: 12px; color: var(--muted); margin-top: 5px; }

  /* ── Stats grid ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  @media(min-width:600px){ .stats { grid-template-columns: repeat(4, 1fr); } }

  .stat-card {
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    border: 2px solid transparent;
  }
  .stat-card:active { transform: scale(0.96); }
  .stat-card.active { border-color: currentColor; }
  .stat-card.speed  { background: var(--speed-bg);  color: var(--speed);  }
  .stat-card.power  { background: var(--power-bg);  color: var(--power);  }
  .stat-card.both   { background: var(--both-bg);   color: var(--both);   }
  .stat-card.other  { background: var(--other-bg);  color: var(--other);  }

  .stat-num  { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; line-height: 1; }
  .stat-label{ font-size: 11px; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .stat-pct  { font-family: 'Space Mono', monospace; font-size: 11px; opacity: .6; margin-top: 2px; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center; margin-bottom: 16px;
  }
  .btn {
    border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-download { background: var(--both); color: #001a0e; }
  .btn-clear    { background: var(--card); color: var(--muted); }

  .search {
    flex: 1; min-width: 180px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .search::placeholder { color: var(--muted); }
  .search:focus { border-color: var(--accent); }

  .count-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .table-inner { overflow-x: auto; max-height: 60vh; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { position: sticky; top: 0; z-index: 2; }
  th {
    background: var(--card);
    padding: 11px 14px;
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .4px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:hover td { background: var(--card); }

  .idx { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; width: 40px; }
  .title-cell { max-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }

  .badge {
    display: inline-block;
    border-radius: 99px;
    padding: 3px 10px;
    font-size: 11px; font-weight: 600;
    white-space: nowrap;
  }
  .badge.speed { background: var(--speed-bg); color: var(--speed);  border: 1px solid #38bdf830; }
  .badge.power { background: var(--power-bg); color: var(--power);  border: 1px solid #fbbf2430; }
  .badge.both  { background: var(--both-bg);  color: var(--both);   border: 1px solid #34d39930; }
  .badge.other { background: var(--other-bg); color: var(--other);  border: 1px solid #94a3b830; }

  .table-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    font-family: 'Space Mono', monospace;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .big { font-size: 48px; margin-bottom: 12px; }

  /* ── Install toast ── */
  #install-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #001520;
    border-radius: 12px; padding: 12px 20px;
    font-size: 13px; font-weight: 600;
    display: none; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px #00d4ff44;
    z-index: 999; cursor: pointer;
    white-space: nowrap;
  }
  #install-bar.show { display: flex; }

  /* ── Progress ── */
  .progress-line {
    height: 3px; background: var(--border); border-radius: 99px;
    overflow: hidden; margin-bottom: 18px; display: none;
  }
  .progress-line.show { display: block; }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 99px; transition: width .3s;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Wind<span>Class</span></div>
  <div class="subtitle" id="hdr-count">nenhum arquivo</div>
</header>

<main>
  <!-- Drop zone -->
  <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".csv" style="display:none">
    <div class="icon">🌬️</div>
    <div class="label" id="dz-label">Toque para carregar o CSV</div>
    <div class="hint">Colunas esperadas: title, abstract</div>
  </div>

  <div class="progress-line" id="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Stats (hidden until data loaded) -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat-card speed" id="card-speed" onclick="toggleFilter('velocidade do vento')">
      <div class="stat-num" id="n-speed">0</div>
      <div class="stat-label">Velocidade</div>
      <div class="stat-pct" id="p-speed">0%</div>
    </div>
    <div class="stat-card power" id="card-power" onclick="toggleFilter('potência')">
      <div class="stat-num" id="n-power">0</div>
      <div class="stat-label">Potência</div>
      <div class="stat-pct" id="p-power">0%</div>
    </div>
    <div class="stat-card both" id="card-both" onclick="toggleFilter('ambos')">
      <div class="stat-num" id="n-both">0</div>
      <div class="stat-label">Ambos</div>
      <div class="stat-pct" id="p-both">0%</div>
    </div>
    <div class="stat-card other" id="card-other" onclick="toggleFilter('outro')">
      <div class="stat-num" id="n-other">0</div>
      <div class="stat-label">Outro</div>
      <div class="stat-pct" id="p-other">0%</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none">
    <button class="btn btn-download" onclick="downloadCSV()">⬇ Baixar CSV</button>
    <input class="search" id="search" placeholder="Buscar por título..." oninput="renderTable()">
    <button class="btn btn-clear" id="btn-clear" onclick="clearFilter()" style="display:none">✕ filtro</button>
    <span class="count-label" id="visible-count"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="table-wrap" style="display:none">
    <div class="table-inner">
      <table>
        <thead>
          <tr>
            <th class="idx">#</th>
            <th>Título</th>
            <th style="width:155px">Categoria</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="table-footer" id="table-footer"></div>
  </div>
</main>

<!-- Install bar -->
<div id="install-bar" onclick="installPWA()">
  📲 Instalar como app no tablet
</div>

<script>
// ── Keyword rules ─────────────────────────────────────────────────────────
const SPEED_KW = [
  "wind speed","wind velocity","speed forecast","speed predict","speed estimat",
  "speed model","wind resource assess","weibull","wind atlas","anemometer",
  "wind distribution","wind profile","wind measurement","return period wind",
  "wind extrapolat","wind characteriz","wind potential","wind climatolog",
  "wind regime","wind variab","wind fluctuat",
];
const POWER_KW = [
  "wind power","wind energy forecast","wind energy predict","power forecast",
  "power predict","power output","power generation forecast","power generat",
  "wind farm output","turbine power","wind turbine forecast","power curve",
  "capacity factor","energy yield","power ramp",
];

function classify(title, abstract) {
  const t = ((title||"") + " " + (abstract||"")).toLowerCase();
  const s = SPEED_KW.some(k => t.includes(k));
  const p = POWER_KW.some(k => t.includes(k));
  if (s && p) return "ambos";
  if (s)      return "velocidade do vento";
  if (p)      return "potência";
  return "outro";
}

// ── CSV parser ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const headers = parseLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = parseLine(lines[i]);
    const row = {};
    headers.forEach((h, j) => row[h.trim()] = cols[j] || "");
    rows.push(row);
  }
  return rows;
}
function parseLine(line) {
  const r = []; let cur = "", q = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i]==='"' && line[i+1]==='"') { cur+='"'; i++; }
    else if (line[i]==='"') { q=!q; }
    else if (line[i]===',' && !q) { r.push(cur); cur=""; }
    else cur += line[i];
  }
  r.push(cur); return r;
}

// ── State ──────────────────────────────────────────────────────────────────
let allRows = [];
let activeFilter = null;

const CAT_CLASS = {
  "velocidade do vento": "speed",
  "potência": "power",
  "ambos": "both",
  "outro": "other",
};
const CAT_LABEL = {
  "velocidade do vento": "Velocidade",
  "potência": "Potência",
  "ambos": "Ambos",
  "outro": "Outro",
};

// ── Load file ──────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('dz-label').textContent = `Carregando ${file.name}…`;
  document.getElementById('progress-wrap').classList.add('show');
  document.getElementById('progress-fill').style.width = '30%';

  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('progress-fill').style.width = '70%';
    setTimeout(() => {
      const parsed = parseCSV(ev.target.result);
      allRows = parsed.map(r => ({ ...r, categoria: classify(r.title, r.abstract) }));
      document.getElementById('progress-fill').style.width = '100%';
      setTimeout(() => {
        document.getElementById('progress-wrap').classList.remove('show');
        document.getElementById('progress-fill').style.width = '0%';
        showResults(file.name);
      }, 300);
    }, 50);
  };
  reader.readAsText(file, 'utf-8');
});

// drag & drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('active'); });
dz.addEventListener('dragleave', () => dz.classList.remove('active'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) {
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('file-input').files = dt.files;
    document.getElementById('file-input').dispatchEvent(new Event('change'));
  }
});

function showResults(filename) {
  const n = allRows.length;
  document.getElementById('dz-label').textContent = `✅ ${n} artigos de "${filename}"`;
  document.getElementById('hdr-count').textContent = `${n} artigos`;
  document.getElementById('stats').style.display   = 'grid';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('table-wrap').style.display = 'block';
  updateStats();
  renderTable();
}

function updateStats() {
  const n = allRows.length;
  const counts = { "velocidade do vento": 0, "potência": 0, "ambos": 0, "outro": 0 };
  allRows.forEach(r => counts[r.categoria]++);
  const ids = { "velocidade do vento": "speed", "potência": "power", "ambos": "both", "outro": "other" };
  Object.entries(counts).forEach(([cat, c]) => {
    const k = ids[cat];
    document.getElementById(`n-${k}`).textContent = c;
    document.getElementById(`p-${k}`).textContent = n ? Math.round(c/n*100)+'%' : '0%';
  });
  // active card highlight
  Object.values(ids).forEach(k => document.getElementById(`card-${k}`).classList.remove('active'));
  if (activeFilter) {
    const k = ids[activeFilter];
    if (k) document.getElementById(`card-${k}`).classList.add('active');
  }
}

function toggleFilter(cat) {
  activeFilter = activeFilter === cat ? null : cat;
  document.getElementById('btn-clear').style.display = activeFilter ? 'block' : 'none';
  updateStats();
  renderTable();
}
function clearFilter() {
  activeFilter = null;
  document.getElementById('btn-clear').style.display = 'none';
  updateStats();
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const visible = allRows.filter((r, i) => {
    r._idx = i;
    const matchCat = !activeFilter || r.categoria === activeFilter;
    const matchQ   = !q || (r.title||"").toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('visible-count').textContent = `${visible.length} / ${allRows.length}`;

  const MAX = 300;
  const shown = visible.slice(0, MAX);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = shown.map((r, i) => {
    const cls = CAT_CLASS[r.categoria] || 'other';
    const lbl = CAT_LABEL[r.categoria] || r.categoria;
    return `<tr>
      <td class="idx">${r._idx + 1}</td>
      <td class="title-cell" title="${escHtml(r.title)}">${escHtml(r.title)}</td>
      <td><span class="badge ${cls}">${lbl}</span></td>
    </tr>`;
  }).join('');

  const footer = document.getElementById('table-footer');
  footer.style.display = visible.length > MAX ? 'block' : 'none';
  footer.textContent = `mostrando ${MAX} de ${visible.length} — use a busca ou filtro de categoria para refinar`;
}

function escHtml(s) {
  return (s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Download ───────────────────────────────────────────────────────────────
function downloadCSV() {
  const lines = ["title,abstract,categoria"];
  allRows.forEach(r => {
    const f = v => `"${String(v||"").replace(/"/g,'""')}"`;
    lines.push([f(r.title), f(r.abstract), f(r.categoria)].join(","));
  });
  const encoded = btoa(unescape(encodeURIComponent(lines.join("\n"))));
  const a = document.createElement("a");
  a.href = `data:text/csv;charset=utf-8;base64,${encoded}`;
  a.download = "artigos-classificados.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── PWA Install ────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-bar').classList.add('show');
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-bar').classList.remove('show');
  });
}
window.addEventListener('appinstalled', () => {
  document.getElementById('install-bar').classList.remove('show');
});
</script>

<!-- PWA manifest inline -->
<script>
const manifest = {
  name: "WindClass — Classificador Eólico",
  short_name: "WindClass",
  description: "Classifica artigos de energia eólica por categoria",
  start_url: ".",
  display: "standalone",
  background_color: "#0f1923",
  theme_color: "#0f1923",
  orientation: "any",
  icons: [{
    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230f1923'/%3E%3Ctext x='256' y='340' font-size='260' text-anchor='middle'%3E🌬️%3C/text%3E%3C/svg%3E",
    sizes: "512x512", type: "image/svg+xml", purpose: "any maskable"
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const mURL  = URL.createObjectURL(blob);
const link  = document.createElement('link');
link.rel    = 'manifest';
link.href   = mURL;
document.head.appendChild(link);
</script>
</body>
</html>
